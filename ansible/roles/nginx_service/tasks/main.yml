---
- name: Ensure nginx package is installed
  ansible.builtin.package:
    name: "{{ nginx_package_name }}"
    state: present

- name: Ensure nginx config directory exists
  ansible.builtin.file:
    path: "{{ nginx_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy nginx main configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ nginx_main_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Ensure web root directory exists
  ansible.builtin.file:
    path: "{{ nginx_web_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy environment-specific index page
  ansible.builtin.copy:
    dest: "{{ nginx_web_root }}/{{ nginx_index_file }}"
    content: |
      <html>
      <head><title>{{ nginx_environment | upper }}</title></head>
      <body>
        <h1>{{ nginx_environment_message }}</h1>
        <p>Environment: {{ nginx_environment }}</p>
      </body>
      </html>
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Ensure nginx service is enabled and started
  ansible.builtin.service:
    name: "{{ nginx_service_name }}"
    state: started
    enabled: true
